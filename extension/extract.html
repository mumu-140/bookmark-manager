<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提取浏览器书签</title>
  <style>
    :root {
      --bg: #f4f1ec;
      --surface: #ffffff;
      --border: #ddd4c8;
      --text: #1a1714;
      --text-muted: #6e665d;
      --primary: #b05830;
      --primary-hover: #8e3f1e;
      --success: #1d7a50;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 40px 20px;
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 32px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .option-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .option:hover {
      border-color: var(--primary);
      background: #f9f5ee;
    }

    .option input[type="radio"] {
      cursor: pointer;
      width: 18px;
      height: 18px;
    }

    .option-content {
      flex: 1;
    }

    .option-title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .option-desc {
      color: var(--text-muted);
      font-size: 13px;
    }

    .selected-info {
      background: #e8f5ee;
      border: 1px solid var(--success);
      color: var(--success);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .selected-info.show {
      display: block;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      width: 100%;
      margin-bottom: 12px;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
      width: 100%;
    }

    .btn-secondary:hover {
      background: #f9f5ee;
    }

    .format-options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .format-btn {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .format-btn:hover {
      border-color: var(--primary);
      background: #f9f5ee;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📤 提取浏览器书签</h1>
    <p class="subtitle">从当前浏览器提取书签，导出为文件或上传到 Gist</p>

    <div class="card">
      <div class="section-title">1. 选择提取范围</div>
      <div class="option-group">
        <label class="option">
          <input type="radio" name="range" value="all" checked>
          <div class="option-content">
            <div class="option-title">📚 提取所有书签</div>
            <div class="option-desc">包括书签栏、其他书签等所有文件夹</div>
          </div>
        </label>

        <label class="option">
          <input type="radio" name="range" value="select">
          <div class="option-content">
            <div class="option-title">📁 选择特定文件夹</div>
            <div class="option-desc">自定义选择要提取的文件夹（支持多选）</div>
          </div>
        </label>
      </div>

      <div class="selected-info" id="selectedInfo">
        已选择: 0 个文件夹，共 0 个书签
      </div>

      <button class="btn-secondary" id="selectFoldersBtn" style="display: none;">
        📂 选择文件夹
      </button>
    </div>

    <div class="card">
      <div class="section-title">2. 选择导出格式</div>
      <div class="format-options">
        <button class="format-btn" data-format="bookmarkhub">
          📦 BookmarkHub JSON
        </button>
        <button class="format-btn" data-format="html">
          📄 Chromium HTML
        </button>
        <button class="format-btn" data-format="json">
          🌲 树形 JSON
        </button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">3. 导出</div>
      <button class="btn-primary" id="downloadBtn">
        💾 下载到本地
      </button>
      <button class="btn-secondary" id="uploadGistBtn">
        ☁️ 上传到 Gist
      </button>
    </div>
  </div>

  <script src="extract.js"></script>
  <script src="extract-page.js"></script>
</body>
</html>
